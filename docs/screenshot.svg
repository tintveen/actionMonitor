  <text x="170" y="190" fill="#111827" font-family="SF Pro Display, Arial, sans-serif" font-size="34" font-weight="700">actionMonitor Settings</text>
  <text x="170" y="228" fill="#475569" font-family="SF Pro Text, Arial, sans-serif" font-size="18">Configure the workflows you want to watch from the menu bar.</text>

