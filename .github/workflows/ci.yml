name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Run test suite
        run: swift test

      - name: Build app bundle smoke test
        run: ./scripts/build-app.sh ./dist-ci/actionMonitor.app
